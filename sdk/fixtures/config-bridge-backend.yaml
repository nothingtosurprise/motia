workers:
  - name: iii-worker-manager
    config:
      port: 49198

  - name: iii-stream
    config:
      port: 3113
      host: 0.0.0.0
      adapter:
        name: kv
        config:
          store_method: in_memory

  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: in_memory

  - name: iii-pubsub
    config:
      adapter:
        name: local

  - name: iii-observability
    config:
      enabled: false
