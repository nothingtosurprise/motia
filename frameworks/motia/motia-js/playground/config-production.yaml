workers:
  - name: iii-stream
    config:
      port: ${STREAM_PORT:31112}
      host: 0.0.0.0
      auth_function: motia.stream.authenticate
      adapter:
        name: redis
        config:
          redis_url: ${REDIS_URL:redis://localhost:6379}

  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0
      cors:
        allowed_origins:
          - http://localhost:3000
          - http://localhost:5173
          - https://todo-app-xi-umber.vercel.app
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  - name: iii-queue
    config:
      adapter:
        name: redis
        config:
          redis_url: ${REDIS_URL:redis://localhost:6379}

  - name: iii-cron
    config:
      adapter:
        name: redis
        config:
          redis_url: ${REDIS_URL:redis://localhost:6379}

  - name: iii-exec
    config:
      exec:
        - bun run --enable-source-maps index-production.js
